            padding: 0;

        }

            color: #1F2937;

        }

        :root {
            --purple-primary: #7C3AED;
            --purple-dark: #6D28D9;
            --purple-soft: #EDE9FE;
            --purple-glow: rgba(124,58,237,0.2);

            --gold-dark: #D97706;
            --gold-soft: #FEF3C7;
            --text-dark: #1F2937;
            --text-muted: #6B7280;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.6);

            --shadow-md: 0 20px 25px -8px rgba(0,0,0,0.08);

            --radius-glass: 1.8rem;

        .container {

            margin: 0 auto;
            padding: 0 1.5rem;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(124,58,237,0.15);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 0.9rem 0;
        }

        .nav-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo a {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .logo img {
            height: 44px;
            width: auto;
            transition: transform 0.2s ease;
        }

        .logo img:hover {
            transform: scale(1.02);
        }

        .logo-text {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--purple-primary), var(--gold-primary));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            font-weight: 500;
            color: var(--text-muted);
            transition: 0.2s;
            font-size: 0.95rem;
        }

        .nav-links a:hover {
            color: var(--purple-primary);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin: 1.5rem 0 1rem;
            color: var(--purple-primary);
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
        }
        .back-link:hover i { transform: translateX(-4px); }
        .back-link:hover { color: var(--purple-dark); }

        .progress-container {
            background: rgba(0,0,0,0.08);
            border-radius: 40px;
            height: 8px;
            width: 100%;
            margin: 1rem 0 1.5rem;
            overflow: hidden;
        }
        .progress-fill {
            background: linear-gradient(90deg, var(--purple-primary), var(--gold-primary));
            width: 0%;
            height: 100%;
            border-radius: 40px;
            transition: width 0.4s ease;
        }

        .lesson-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-radius: var(--radius-glass);
            border: 1px solid var(--glass-border);
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-sm);
        }

        .lesson-badge {
            background: linear-gradient(115deg, var(--purple-soft), #FEF3C7);
            color: var(--purple-primary);
            border-radius: 60px;
            font-size: 0.75rem;
            font-weight: 800;
            padding: 0.3rem 1rem;
            display: inline-block;
            margin-bottom: 1rem;
        }

            font-weight: 800;

            background-clip: text;
            -webkit-background-clip: text;

            height: 0;

            border-radius: 1.2rem;
            overflow: hidden;
            box-shadow: var(--shadow-md);

            left: 0;

            height: 100%;
            border: none;
        }

            margin: 0.75rem 0;
        }
        .deep-content ul {
            padding-left: 1.5rem;
        }
        .info-table {

            background: white;
            border-radius: 1rem;
            overflow: hidden;
            margin: 1rem 0;
        }

            text-align: left;

            background: #F9FAFB;

            cursor: pointer;
        }
        .btn-primary, .btn-secondary, .btn-next {

            padding: 0.7rem 1.8rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            transition: all 0.2s;

        .btn-primary {
            background: var(--purple-primary);
            color: white;
            box-shadow: 0 2px 8px rgba(124,58,237,0.3);
        }

            background: var(--purple-dark);

        }
        .btn-secondary {
            background: var(--gold-primary);
            color: #1F2937;
        }
        .btn-secondary:hover {
            background: var(--gold-dark);
            transform: translateY(-2px);
        }

            background: #10b981;

            transform: translateY(-2px);

            margin-top: 1rem;
            padding: 0.9rem;
            border-radius: 1rem;
            font-weight: 500;

            align-items: center;
            gap: 0.5rem;

        .feedback.success {

            color: #065F46;

        }
        .feedback.error {
            background: #FEE2E2;
            color: #991B1B;
            border-left: 4px solid #EF4444;
        }
        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            border-top: 1px solid rgba(0,0,0,0.05);
            margin-top: 2rem;
            font-size: 0.85rem;

        @media (max-width: 768px) {
            .container { padding: 0 1rem; }
            .lesson-glass { padding: 1.2rem; }
            h1 { font-size: 1.6rem; }
            .nav-container { flex-direction: column; text-align: center; }
            .nav-links { justify-content: center; gap: 1rem; }
            .deep-content { padding: 1rem; }
            .info-table th, .info-table td { font-size: 0.8rem; padding: 0.5rem; }
            .quiz-modern { padding: 1rem; }
            .btn-primary, .btn-secondary, .btn-next { padding: 0.5rem 1.2rem; font-size: 0.85rem; }
            .logo img { height: 38px; }
            .logo-text { font-size: 1.4rem; }
        }
        @media (max-width: 480px) {
            .back-link { font-size: 0.85rem; }
            .logo-text { font-size: 1.2rem; }
        }
    </style>
</head>

    // localStorage helpers
    function loadUserData() {
        let data = localStorage.getItem("fingrow_user");
        if (!data) {
            const defaultData = {
                name: "Alex",
                lessonsCompleted: [],
                portfolio: { cash: 10000, holdings: [] },
                habits: { currentStreak: 0, longestStreak: 0, lastCheckin: null },
                activity: [],
                totalPortfolioValue: 10000
            };
            localStorage.setItem("fingrow_user", JSON.stringify(defaultData));
            return defaultData;
        }
        return JSON.parse(data);
    }

    function saveUserData(data) {
        localStorage.setItem("fingrow_user", JSON.stringify(data));
    }

    function addActivity(userData, actionText) {
        const today = new Date().toISOString().slice(0,10);
        userData.activity.unshift({ text: actionText, date: today, type: "lesson" });
        if (userData.activity.length > 20) userData.activity.pop();
        saveUserData(userData);
    }

    function updateProgressBar(userData) {
        const total = Object.keys(lessonsData).length;
        const completedCount = userData.lessonsCompleted.length;
        const percent = (completedCount / total) * 100;
        const fill = document.getElementById("lessonProgressFill");
        if (fill) fill.style.width = `${percent}%`;
    }

    function getNextLessonId(currentId, userData) {
        const ids = Object.keys(lessonsData).map(Number).sort((a,b) => a-b);
        const idx = ids.indexOf(currentId);
        if (idx !== -1 && idx + 1 < ids.length) return ids[idx+1];
        return null;
    }

    function renderLesson() {
        const params = new URLSearchParams(window.location.search);
        const lessonId = parseInt(params.get('id'));
        const lesson = lessonsData[lessonId];

            document.getElementById("lessonContainer").innerHTML = `<div class="lesson-glass"><p>❌ Lesson not found. <a href="lessons.html" style="color: var(--purple-primary);">Browse lessons</a></p></div>`;
            return;
        }

        const userData = loadUserData();
        const isCompleted = userData.lessonsCompleted.includes(lessonId);
        updateProgressBar(userData);

        const container = document.getElementById("lessonContainer");
        container.innerHTML = `
            <div class="lesson-glass">
                <div class="lesson-badge"><i class="fas fa-star-of-life"></i> ${lesson.badge}</div>
                <h1><i class="fas fa-graduation-cap" style="color: var(--gold-primary);"></i> ${lesson.title}</h1>
                <div class="video-wrapper">
                    <iframe src="https://www.youtube.com/embed/${lesson.youtubeId}?rel=0" title="${lesson.title}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
                <div class="deep-content">
                    ${lesson.deepContent}
                </div>
                <div class="quiz-modern">
                    <h3 style="display: flex; gap: 0.5rem;"><i class="fas fa-question-circle" style="color: var(--purple-primary);"></i> Knowledge Check</h3>
                    <div id="quizQuestionsContainer"></div>
                    <button id="submitQuizBtn" class="btn-primary"><i class="fas fa-check-double"></i> Submit Answers</button>
                    <div id="quizFeedbackMsg"></div>
                </div>
                <div id="completionActionArea" style="margin-top: 1.5rem;"></div>
                <div id="nextLessonArea" style="margin-top: 1rem;"></div>
            </div>
        `;

        // Build quiz
        const quizContainer = document.getElementById("quizQuestionsContainer");
        lesson.quiz.forEach((q, idx) => {
            const qDiv = document.createElement("div");
            qDiv.className = "quiz-question";
            qDiv.innerHTML = `<p><i class="fas fa-question"></i> ${idx+1}. ${q.question}</p>`;
            q.options.forEach((opt, optIdx) => {
                const optId = `q${idx}_opt${optIdx}`;
                qDiv.innerHTML += `
                    <label class="quiz-option" for="${optId}">
                        <input type="radio" name="q${idx}" id="${optId}" value="${optIdx}">
                        <span>${opt}</span>
                    </label>
                `;
            });
            quizContainer.appendChild(qDiv);
        });

        const submitBtn = document.getElementById("submitQuizBtn");
        const feedbackDiv = document.getElementById("quizFeedbackMsg");
        const completionArea = document.getElementById("completionActionArea");
        const nextArea = document.getElementById("nextLessonArea");

        submitBtn.addEventListener("click", () => {
            let allCorrect = true;
            for (let i = 0; i < lesson.quiz.length; i++) {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                if (!selected || parseInt(selected.value) !== lesson.quiz[i].correct) {
                    allCorrect = false;
                    break;
                }
            }
            if (allCorrect) {
                feedbackDiv.innerHTML = `<div class="feedback success"><i class="fas fa-trophy"></i> Excellent! You've understood the deep concepts. 🎉</div>`;
                if (!isCompleted) {
                    completionArea.innerHTML = `<button id="markCompleteBtn" class="btn-secondary" style="width:100%;"><i class="fas fa-certificate"></i> Mark as Completed & Earn XP</button>`;
                    document.getElementById("markCompleteBtn").addEventListener("click", () => {
                        if (!userData.lessonsCompleted.includes(lessonId)) {
                            userData.lessonsCompleted.push(lessonId);
                            saveUserData(userData);
                            addActivity(userData, `📘 Completed lesson: ${lesson.title}`);
                            feedbackDiv.innerHTML = `<div class="feedback success"><i class="fas fa-party-horn"></i> Lesson completed! Redirecting...</div>`;
                            setTimeout(() => { window.location.href = "lessons.html"; }, 1200);
                        }
                    });
                } else {
                    completionArea.innerHTML = `<div class="feedback success">🏆 Already completed. Great job!</div>`;
                }
                const nextId = getNextLessonId(lessonId, userData);
                if (nextId && !userData.lessonsCompleted.includes(nextId)) {
                    nextArea.innerHTML = `<button id="nextLessonBtn" class="btn-next"><i class="fas fa-arrow-right"></i> Continue to ${lessonsData[nextId].title}</button>`;
                    document.getElementById("nextLessonBtn")?.addEventListener("click", () => {
                        window.location.href = `lesson.html?id=${nextId}`;
                    });
                } else if (nextId && userData.lessonsCompleted.includes(nextId)) {
                    nextArea.innerHTML = `<div class="feedback success">✨ Next lesson already completed, but you can review it anytime.</div>`;
                } else if (!nextId && userData.lessonsCompleted.length === Object.keys(lessonsData).length) {
                    nextArea.innerHTML = `<div class="feedback success"><i class="fas fa-crown"></i> 🎉 All lessons mastered! You're a pro.</div>`;
                }
            } else {
                feedbackDiv.innerHTML = `<div class="feedback error"><i class="fas fa-redo-alt"></i> Some answers are incorrect. Re-read the material and try again.</div>`;
                completionArea.innerHTML = "";
                nextArea.innerHTML = "";
            }
        });

        if (isCompleted) {
            completionArea.innerHTML = `<div class="feedback success"><i class="fas fa-check-circle"></i> ✅ You have completed this lesson. Keep learning!</div>`;
            submitBtn.disabled = true;
            submitBtn.style.opacity = "0.6";
            const nextId = getNextLessonId(lessonId, userData);
            if (nextId) {
                nextArea.innerHTML = `<button id="nextLessonBtnCompleted" class="btn-next"><i class="fas fa-forward"></i> Next Lesson: ${lessonsData[nextId].title}</button>`;
                document.getElementById("nextLessonBtnCompleted")?.addEventListener("click", () => {
                    window.location.href = `lesson.html?id=${nextId}`;
                });
            }
        }
    }
    renderLesson();
</script>
</body>
</html>
