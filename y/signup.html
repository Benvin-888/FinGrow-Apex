<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FinGrow | Sign up / Log in — Start your investing journey</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #ffffff 0%, #f0ebff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        :root {
            --purple-primary: #6C47FF;
            --purple-dark: #5a3ad1;
            --purple-soft: #f0ebff;
            --gold-primary: #E6B422;
            --gold-dark: #c99f1a;
            --gray-light: #f8f9fc;
            --gray-border: #eef2f6;
            --text-muted: #5a6874;
            --shadow-lg: 0 25px 50px -12px rgba(0,0,0,0.15);
            --radius-card: 2rem;
        }
        .auth-container {
            max-width: 480px;
            width: 100%;
            background: white;
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
        }
        .logo-area {
            text-align: center;
            padding: 2rem 2rem 0;
        }
        .logo-area img {
            height: 60px;
            width: auto;
            margin-bottom: 0.5rem;
        }
        .logo-text {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--purple-primary), var(--gold-primary));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .tabs {
            display: flex;
            margin: 1.5rem 2rem 0;
            border-bottom: 2px solid var(--gray-border);
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 1rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-muted);
            transition: 0.2s;
        }
        .tab.active {
            color: var(--purple-primary);
            border-bottom: 3px solid var(--purple-primary);
        }
        .form-container {
            padding: 2rem;
        }
        .form {
            display: none;
            flex-direction: column;
            gap: 1.2rem;
        }
        .form.active {
            display: flex;
        }
        .input-group {
            position: relative;
        }
        .input-group i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }
        .input-group input {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 2.5rem;
            border: 1px solid var(--gray-border);
            border-radius: 60px;
            font-size: 1rem;
            transition: 0.2s;
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--purple-primary);
            box-shadow: 0 0 0 3px rgba(108,71,255,0.1);
        }
        .btn-auth {
            background: var(--purple-primary);
            color: white;
            border: none;
            padding: 0.9rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-auth:hover {
            background: var(--purple-dark);
            transform: translateY(-2px);
        }
        .guest-link {
            text-align: center;
            margin-top: 1.5rem;
        }
        .guest-link a {
            color: var(--gold-primary);
            text-decoration: none;
            font-weight: 600;
        }
        .apex-ad {
            background: linear-gradient(120deg, #1e1a2f, #2a2442);
            color: white;
            padding: 1rem;
            text-align: center;
            margin-top: 1rem;
        }
        .apex-ad p {
            font-size: 0.8rem;
            opacity: 0.9;
        }
        .error-msg {
            background: #fee2e2;
            color: #991b1b;
            padding: 0.5rem;
            border-radius: 1rem;
            font-size: 0.8rem;
            text-align: center;
        }
        footer {
            text-align: center;
            padding: 1rem;
            font-size: 0.7rem;
            color: var(--text-muted);
            border-top: 1px solid var(--gray-border);
        }
        @media (max-width: 500px) {
            body { padding: 1rem; }
            .form-container { padding: 1.5rem; }
        }
    </style>
</head>
<body>
<div class="auth-container">
    <div class="logo-area">
        <a href="index.html"><img src="Logo.png" alt="FinGrow" onerror="this.src='https://placehold.co/60x60?text=FG'"></a>
        <div class="logo-text">FinGrow</div>
        <p style="color: var(--text-muted); margin-top: 0.5rem;">Learn. Practice. Grow.</p>
    </div>

    <div class="tabs">
        <div class="tab active" data-tab="login">Log In</div>
        <div class="tab" data-tab="signup">Sign Up</div>
    </div>

    <div class="form-container">
        <!-- Login Form -->
        <div id="loginForm" class="form active">
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="loginEmail" placeholder="Email address" autocomplete="email">
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password">
            </div>
            <button id="doLoginBtn" class="btn-auth">Log In</button>
            <div id="loginError" class="error-msg" style="display:none;"></div>
        </div>

        <!-- Signup Form -->
        <div id="signupForm" class="form">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="signupName" placeholder="Full name">
            </div>
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="signupEmail" placeholder="Email address">
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="signupPassword" placeholder="Password (min 6 characters)">
            </div>
            <button id="doSignupBtn" class="btn-auth">Create Free Account</button>
            <div id="signupError" class="error-msg" style="display:none;"></div>
        </div>

        <div class="guest-link">
            <a href="#" id="guestModeBtn">✨ Continue as Guest (1 hour trial)</a>
        </div>
    </div>

    <div class="apex-ad">
        <i class="fas fa-crown" style="color: var(--gold-primary); margin-right: 0.5rem;"></i>
        <strong>Powered by Apex Tech Solutions</strong>
        <p>We build digital ecosystems that educate & empower — fintech, edtech, and beyond.</p>
    </div>
    <footer>
        © 2026 FinGrow — Virtual investing simulator. Not real advice.
    </footer>
</div>

<script>
    // Helper: get existing users from localStorage (simulated database)
    function getUsers() {
        let users = localStorage.getItem("fingrow_users");
        if (!users) {
            // Pre-populate with a demo user? Not necessary.
            return [];
        }
        return JSON.parse(users);
    }

    function saveUsers(users) {
        localStorage.setItem("fingrow_users", JSON.stringify(users));
    }

    // Create a new user account and initialize their FinGrow data
    function createUserAccount(name, email, password) {
        const users = getUsers();
        if (users.find(u => u.email === email)) {
            return { success: false, error: "Email already exists. Please log in." };
        }
        const newUser = {
            id: Date.now(),
            name: name,
            email: email,
            password: password, // In real app, hash this! Demo only.
            createdAt: new Date().toISOString()
        };
        users.push(newUser);
        saveUsers(users);

        // Initialize user's FinGrow data (portfolio, habits, etc.)
        const userData = {
            name: name,
            email: email,
            isGuest: false,
            lessonsCompleted: [],
            portfolio: { cash: 10000, holdings: [] },
            habits: {
                currentStreak: 0,
                longestStreak: 0,
                lastCheckin: null,
                habitsList: [
                    { id: 1, name: "Save $50 this week", frequency: "weekly", streak: 0, lastCompletedDate: null, completedThisWeek: false },
                    { id: 2, name: "Read 1 lesson", frequency: "daily", streak: 0, lastCompletedDate: null, completedToday: false },
                    { id: 3, name: "Log into FinGrow", frequency: "daily", streak: 0, lastCompletedDate: null, completedToday: false },
                    { id: 4, name: "Practice 1 trade in simulator", frequency: "daily", streak: 0, lastCompletedDate: null, completedToday: false }
                ]
            },
            activity: [],
            totalPortfolioValue: 10000,
            settings: { darkMode: false, emailNotifications: true }
        };
        localStorage.setItem("fingrow_user", JSON.stringify(userData));
        return { success: true };
    }

    // Login existing user
    function loginUser(email, password) {
        const users = getUsers();
        const user = users.find(u => u.email === email && u.password === password);
        if (!user) {
            return { success: false, error: "Invalid email or password." };
        }
        // Load that user's FinGrow data from localStorage (keyed by email? For now single active user)
        // We'll store a separate key per email? Simpler: we assume only one active user at a time in this demo.
        // We'll overwrite the current "fingrow_user" with the stored data for that email.
        let userDataKey = `fingrow_user_${email}`;
        let userData = localStorage.getItem(userDataKey);
        if (!userData) {
            // Migrate: create fresh data for this user
            userData = {
                name: user.name,
                email: email,
                isGuest: false,
                lessonsCompleted: [],
                portfolio: { cash: 10000, holdings: [] },
                habits: {
                    currentStreak: 0,
                    longestStreak: 0,
                    lastCheckin: null,
                    habitsList: [
                        { id: 1, name: "Save $50 this week", frequency: "weekly", streak: 0, lastCompletedDate: null, completedThisWeek: false },
                        { id: 2, name: "Read 1 lesson", frequency: "daily", streak: 0, lastCompletedDate: null, completedToday: false },
                        { id: 3, name: "Log into FinGrow", frequency: "daily", streak: 0, lastCompletedDate: null, completedToday: false },
                        { id: 4, name: "Practice 1 trade in simulator", frequency: "daily", streak: 0, lastCompletedDate: null, completedToday: false }
                    ]
                },
                activity: [],
                totalPortfolioValue: 10000,
                settings: { darkMode: false, emailNotifications: true }
            };
            localStorage.setItem(userDataKey, JSON.stringify(userData));
        }
        // Set as active user
        localStorage.setItem("fingrow_user", localStorage.getItem(userDataKey));
        return { success: true };
    }

    // Guest mode: set guest flag with 1 hour expiry
    function startGuestSession() {
        const guestData = {
            name: "Guest",
            email: null,
            isGuest: true,
            guestExpiry: new Date(Date.now() + 60 * 60 * 1000).toISOString(),
            lessonsCompleted: [],
            portfolio: { cash: 10000, holdings: [] },
            habits: {
                currentStreak: 0,
                longestStreak: 0,
                lastCheckin: null,
                habitsList: [
                    { id: 1, name: "Save $50 this week", frequency: "weekly", streak: 0, lastCompletedDate: null, completedThisWeek: false },
                    { id: 2, name: "Read 1 lesson", frequency: "daily", streak: 0, lastCompletedDate: null, completedToday: false },
                    { id: 3, name: "Log into FinGrow", frequency: "daily", streak: 0, lastCompletedDate: null, completedToday: false },
                    { id: 4, name: "Practice 1 trade in simulator", frequency: "daily", streak: 0, lastCompletedDate: null, completedToday: false }
                ]
            },
            activity: [],
            totalPortfolioValue: 10000,
            settings: { darkMode: false, emailNotifications: true }
        };
        localStorage.setItem("fingrow_user", JSON.stringify(guestData));
    }

    // UI toggles
    const tabs = document.querySelectorAll('.tab');
    const loginFormDiv = document.getElementById('loginForm');
    const signupFormDiv = document.getElementById('signupForm');

    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            const target = tab.getAttribute('data-tab');
            if (target === 'login') {
                loginFormDiv.classList.add('active');
                signupFormDiv.classList.remove('active');
            } else {
                signupFormDiv.classList.add('active');
                loginFormDiv.classList.remove('active');
            }
            // Clear errors
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('signupError').style.display = 'none';
        });
    });

    // Login handler
    document.getElementById('doLoginBtn').addEventListener('click', () => {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (!email || !password) {
            showError('loginError', 'Please fill in all fields.');
            return;
        }
        const result = loginUser(email, password);
        if (result.success) {
            window.location.href = 'dashboard.html';
        } else {
            showError('loginError', result.error);
        }
    });

    // Signup handler
    document.getElementById('doSignupBtn').addEventListener('click', () => {
        const name = document.getElementById('signupName').value.trim();
        const email = document.getElementById('signupEmail').value.trim();
        const password = document.getElementById('signupPassword').value;
        if (!name || !email || !password) {
            showError('signupError', 'Please fill in all fields.');
            return;
        }
        if (password.length < 6) {
            showError('signupError', 'Password must be at least 6 characters.');
            return;
        }
        const result = createUserAccount(name, email, password);
        if (result.success) {
            alert('Account created! You are now logged in.');
            window.location.href = 'dashboard.html';
        } else {
            showError('signupError', result.error);
        }
    });

    // Guest mode
    document.getElementById('guestModeBtn').addEventListener('click', (e) => {
        e.preventDefault();
        startGuestSession();
        window.location.href = 'dashboard.html';
    });

    function showError(elementId, message) {
        const errorDiv = document.getElementById(elementId);
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
        setTimeout(() => {
            errorDiv.style.display = 'none';
        }, 3000);
    }
</script>
</body>
</html>
